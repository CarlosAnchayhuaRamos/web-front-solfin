services:
  - type: web
    name: solfin-api-pilot
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build:server
    startCommand: npm --prefix server run start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        sync: false

  - type: web
    name: solfin-web-pilot
    runtime: static
    buildCommand: npm ci --include=dev && npm run build:web
    staticPublishPath: web/build
    autoDeployTrigger: commit
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
